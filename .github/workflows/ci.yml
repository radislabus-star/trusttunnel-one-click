name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test tools
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Run checks
        run: bash tests/static.sh
